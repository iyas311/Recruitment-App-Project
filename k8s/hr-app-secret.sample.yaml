apiVersion: v1
kind: Secret
metadata:
  name: hr-app-secrets
type: Opaque
stringData:
  # Uses Mongo root credentials by default so the stack works without extra init jobs.
  # Keep this value in sync with mongodb-secret.sample.yaml and rotate in production.
  MONGO_URI: "mongodb://root:rootpassword123@mongodb:27017/hr_system?authSource=admin"
