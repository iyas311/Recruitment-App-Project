apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruitment-app
  labels:
    app: recruitment-app
  namespace: iyas-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recruitment-app
  template:
    metadata:
      labels:
        app: recruitment-app
    spec:
      containers:
        - name: recruitment-app
          image: iyask/recrapp:v1.0.1
          
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: recr-config
            - secretRef:
                name: recr-secret
  